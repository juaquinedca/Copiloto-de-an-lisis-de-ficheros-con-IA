name: Build release ZIP

on:
  push:
    tags:
      - 'v*'

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          ZIP_NAME="release-${GITHUB_REF_NAME}.zip"
          # Exclude venv, git metadata and local env
          zip -r "$ZIP_NAME" . -x ".git/*" ".venv/*" ".env" ".github/workflows/*" "*.pyc" "__pycache__/*"
          ls -lh "$ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-zip-${{ github.ref_name }}
          path: release-${{ github.ref_name }}.zip
